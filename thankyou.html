<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Message Sent | Sheikh Salman Hossain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
    }

    .card {
      background: #111c44;
      padding: 50px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .card h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #ff4b2b;
    }

    .card p {
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.6;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #ff4b2b;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #ff2e00;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>✅ Message Sent Successfully!</h1>
    <p>
      Thank you for reaching out.  
      I have received your message and will get back to you as soon as possible.
    </p>

    <a href="https://salmandevops.com" class="btn">Back to Home</a>
  </div>

</body>
</html>
